<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HamzaHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070a0f;
      --surface: #0d1117;
      --border: #1e2530;
      --accent1: #00f5a0;
      --accent2: #00d9f5;
      --accent3: #f5a000;
      --accent4: #f54040;
      --text: #e8edf5;
      --muted: #4a5568;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--accent1);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: exclusion;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid var(--accent1);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.15s ease, width 0.2s, height 0.2s, border-color 0.2s;
      mix-blend-mode: exclusion;
      transform: translate(-13px, -13px);
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,160,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,160,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    .noise {
      position: fixed; inset: 0; z-index: 1; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; }
    .orb-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(0,245,160,.08) 0%,transparent 70%);top:-150px;left:-150px;animation:orbFloat1 12s ease-in-out infinite; }
    .orb-2 { width:400px;height:400px;background:radial-gradient(circle,rgba(0,217,245,.07) 0%,transparent 70%);bottom:-100px;right:-100px;animation:orbFloat2 15s ease-in-out infinite; }
    .orb-3 { width:300px;height:300px;background:radial-gradient(circle,rgba(245,160,0,.05) 0%,transparent 70%);top:50%;left:50%;animation:orbFloat3 20s ease-in-out infinite; }
    @keyframes orbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
    @keyframes orbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
    @keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%) scale(1)}33%{transform:translate(-40%,-60%) scale(1.2)}66%{transform:translate(-60%,-40%) scale(.9)}}

    .wrapper {
      position: relative; z-index: 2; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px;
    }

    header {
      text-align: center; margin-bottom: 72px;
      opacity: 0; transform: translateY(-30px);
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px,15vw,140px);
      line-height: 0.9; letter-spacing: 6px;
      background: linear-gradient(135deg,#fff 30%,var(--accent2) 70%,var(--accent1) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      position: relative; user-select: none;
    }
    h1::after {
      content: 'HamzaHub'; position: absolute; inset: 0;
      background: linear-gradient(135deg,#fff 30%,var(--accent2) 70%,var(--accent1) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: blur(20px); opacity: 0.3; z-index: -1;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 720px;
      width: 100%;
    }
    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; max-width: 400px; }
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 28px 32px;
      text-decoration: none; color: var(--text);
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, box-shadow 0.3s;
      opacity: 0; transform: translateY(40px);
      cursor: none;
    }
    .card:nth-child(1){animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .5s forwards;--card-accent:var(--accent1)}
    .card:nth-child(2){animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .65s forwards;--card-accent:var(--accent2)}
    .card:nth-child(3){animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .8s forwards;--card-accent:var(--accent3)}
    .card:nth-child(4){animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .95s forwards;--card-accent:var(--accent4)}

    .card::before {
      content:''; position:absolute; top:0;left:0;right:0; height:2px;
      background:var(--card-accent); box-shadow:0 0 12px var(--card-accent);
      transform:scaleX(0); transition:transform .4s cubic-bezier(.34,1.56,.64,1);
      transform-origin:left;
    }
    .card::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at center top,color-mix(in srgb,var(--card-accent) 8%,transparent),transparent 70%);
      opacity:0; transition:opacity .3s;
    }
    .card:hover { transform:translateY(-6px); border-color:color-mix(in srgb,var(--card-accent) 40%,var(--border)); box-shadow:0 20px 60px -10px color-mix(in srgb,var(--card-accent) 20%,transparent); }
    .card:hover::before{transform:scaleX(1)}
    .card:hover::after{opacity:1}

    .card-num {
      font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px;
      color:var(--card-accent); margin-bottom:20px;
      display:flex; align-items:center; gap:10px;
    }
    .card-num::after{content:'';flex:1;height:1px;background:var(--border)}

    .card-icon { margin-bottom:18px;display:block;color:var(--card-accent);transition:transform .3s; }
    .card:hover .card-icon{transform:scale(1.15) rotate(-3deg)}

    .card-title { font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:10px;line-height:1.2; }

    .card-link {
      display:inline-flex;align-items:center;gap:8px;
      font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;
      color:var(--card-accent);transition:gap .3s;
    }
    .card:hover .card-link{gap:14px}
    .card-link svg{width:14px;height:14px;transition:transform .3s}
    .card:hover .card-link svg{transform:translateX(3px)}

    .card-corner {
      position:absolute;bottom:20px;right:20px;width:40px;height:40px;opacity:.06;
      border-right:2px solid var(--card-accent);border-bottom:2px solid var(--card-accent);
      transition:opacity .3s,width .3s,height .3s;
    }
    .card:hover .card-corner{opacity:.25;width:55px;height:55px}

    footer {
      margin-top:72px;text-align:center;opacity:0;
      animation:fadeUp .8s cubic-bezier(.16,1,.3,1) 1.1s forwards;
    }
    .footer-line{display:flex;align-items:center;gap:20px;justify-content:center;margin-bottom:16px}
    .footer-line::before,.footer-line::after{content:'';width:60px;height:1px;background:var(--border)}
    .footer-dot{width:6px;height:6px;border-radius:50%;background:var(--accent1);box-shadow:0 0 8px var(--accent1);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .footer-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

    .scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent1),transparent);opacity:.15;z-index:10;animation:scan 4s linear infinite}
    @keyframes scan{0%{top:0%}100%{top:100%}}
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="scanline"></div>
  <div class="grid-bg"></div>
  <div class="noise"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="wrapper">
    <header>
      <h1>HamzaHub</h1>
    </header>

    <main>
      <div class="cards">

        <a class="card" href="https://kart-gilt.vercel.app/" target="_blank" rel="noopener">
          <div class="card-num">01</div>
          <span class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="38" height="38"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M6 15h4"/></svg>
          </span>
          <div class="card-title">Kart</div>
          <div class="card-link">Gözat<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
          <div class="card-corner"></div>
        </a>

        <a class="card" href="https://osuruk-two.vercel.app/" target="_blank" rel="noopener">
          <div class="card-num">02</div>
          <span class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="38" height="38"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </span>
          <div class="card-title">Refleks</div>
          <div class="card-link">Gözat<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
          <div class="card-corner"></div>
        </a>

        <a class="card" href="https://hafiza-projesi.vercel.app/" target="_blank" rel="noopener">
          <div class="card-num">03</div>
          <span class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="38" height="38"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/><circle cx="15" cy="9" r="1.5" fill="currentColor"/><circle cx="9" cy="15" r="1.5" fill="currentColor"/><circle cx="15" cy="15" r="1.5" fill="currentColor"/></svg>
          </span>
          <div class="card-title">Simon Says</div>
          <div class="card-link">Gözat<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
          <div class="card-corner"></div>
        </a>

        <a class="card" href="https://denme1212.github.io/nealaka/" target="_blank" rel="noopener">
          <div class="card-num">04</div>
          <span class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="38" height="38"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </span>
          <div class="card-title">FreeApps</div>
          <div class="card-link">Gözat<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
          <div class="card-corner"></div>
        </a>

      </div>
    </main>

    <footer>
      <div class="footer-line"><div class="footer-dot"></div></div>
      <p class="footer-text">ayak</p>
    </footer>
  </div>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mouseX=0,mouseY=0,ringX=0,ringY=0;
    document.addEventListener('mousemove',e=>{
      mouseX=e.clientX;mouseY=e.clientY;
      cursor.style.transform=`translate(${mouseX-5}px,${mouseY-5}px)`;
    });
    function animateRing(){
      ringX+=(mouseX-ringX-18)*.12;ringY+=(mouseY-ringY-18)*.12;
      ring.style.transform=`translate(${ringX}px,${ringY}px)`;
      requestAnimationFrame(animateRing);
    }
    animateRing();
    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('mouseenter',()=>{ring.style.width='60px';ring.style.height='60px';ring.style.borderColor='var(--accent2)';});
      card.addEventListener('mouseleave',()=>{ring.style.width='36px';ring.style.height='36px';ring.style.borderColor='var(--accent1)';});
    });
  </script>
</body>
</html>
